name: Supabase Keepalive
on:
  schedule:
    - cron: '0 0 * * 1,4'   # 매주 월·목 09:00 KST (UTC 00:00)
  workflow_dispatch:         # 수동 실행 버튼
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Query DB to reset inactivity timer
        run: |
          curl -fsS \
            "${{ secrets.SUPABASE_URL }}/rest/v1/price_data?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
