name: Supabase Keepalive
on:
  schedule:
    - cron: '0 0 * * 1,4'
  workflow_dispatch:
jobs:
  ping:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
    steps:
      - name: Check secrets present
        run: |
          if [ -z "$SUPABASE_URL" ]; then echo "SUPABASE_URL is EMPTY"; exit 1; fi
          if [ -z "$SUPABASE_ANON_KEY" ]; then echo "SUPABASE_ANON_KEY is EMPTY"; exit 1; fi
          echo "URL length: ${#SUPABASE_URL}  KEY length: ${#SUPABASE_ANON_KEY}"
      - name: Query DB to reset inactivity timer
        run: |
          curl -fsS \
            "$SUPABASE_URL/rest/v1/price_data?select=id&limit=1" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY"
